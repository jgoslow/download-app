<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Drop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c1628;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    svg {
      cursor: pointer;
      overflow: visible;
      width: 180px;
      height: 200px;
    }

    /*
      Drop path: nearly-straight sides that taper to a sharp tip,
      tangent-joining a circular arc at the bottom (same center/radius as
      the activated circle so only the top half morphs).
    */
    #bg, #clipShape {
      d: path("M 100 10 C 106 32 166 84 166 140 C 166 177 137 206 100 206 C 63 206 34 177 34 140 C 34 84 94 32 100 10 Z");
    }

    #bg {
      fill: url(#bgGrad);
      filter: url(#glow);
      transition: d 0.72s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Same bottom arc, only top segments change */
    #bg.morphing {
      d: path("M 100 74 C 137 74 166 103 166 140 C 166 177 137 206 100 206 C 63 206 34 177 34 140 C 34 103 63 74 100 74 Z");
    }

    #shimmerGroup {
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }
    #shimmerGroup.visible { opacity: 1; }

    .hint {
      color: rgba(147, 210, 240, 0.45);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: opacity 0.7s;
      user-select: none;
    }
    .hint.gone { opacity: 0; }
  </style>
</head>
<body>
  <div class="stage">
    <svg viewBox="0 0 200 220">
      <defs>
        <!-- Deep water gradient: bright centre, dark edges -->
        <radialGradient id="bgGrad" cx="42%" cy="30%" r="65%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#e0f2fe" />
          <stop offset="20%"  stop-color="#7dd3fc" />
          <stop offset="62%"  stop-color="#0ea5e9" />
          <stop offset="100%" stop-color="#075985" />
        </radialGradient>

        <!-- Shimmer surface: white-ish centre fading to transparent -->
        <radialGradient id="shimmerGrad" cx="50%" cy="42%" r="56%">
          <stop offset="0%"   stop-color="#f0f9ff"  stop-opacity="0.82" />
          <stop offset="50%"  stop-color="#bae6fd"  stop-opacity="0.38" />
          <stop offset="100%" stop-color="#38bdf8"  stop-opacity="0" />
        </radialGradient>

        <!-- Blue ambient glow -->
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur" />
          <feFlood flood-color="#38bdf8" flood-opacity="0.45" result="color" />
          <feComposite in="color" in2="blur" operator="in" result="coloredBlur" />
          <feMerge>
            <feMergeNode in="coloredBlur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>

        <!-- Clip path tracks the animated blob shape -->
        <clipPath id="shapeClip">
          <path id="clipShape" />
        </clipPath>
      </defs>

      <!-- Filled shape (glow + gradient) -->
      <path id="bg" />

      <!--
        Water shimmer: a large ellipse that rotates slowly inside the clip.
        Same technique as the reference pen — the rotating oval creates a
        wave-like surface where it crosses the clip boundary.
      -->
      <g id="shimmerGroup" clip-path="url(#shapeClip)">
        <ellipse id="shimmer" cx="100" cy="140" rx="108" ry="62"
                 fill="url(#shimmerGrad)" />
      </g>
    </svg>

    <span class="hint" id="hint">Click to activate</span>
  </div>

  <script>
    const bg          = document.getElementById('bg');
    const clipShape   = document.getElementById('clipShape');
    const shimmer     = document.getElementById('shimmer');
    const shimmerGrp  = document.getElementById('shimmerGroup');
    const hint        = document.getElementById('hint');

    // Circle geometry — shared by drop (bottom arc) and activated state
    const CX = 100, CY = 140, R = 66, KR = 37;

    /*
      buildPath: perturb each of the 4 cardinal anchor points radially.
      Control points stay fixed relative to CX/CY so the curve stays smooth.
    */
    function buildPath(dT, dR, dB, dL) {
      const t = CY - R + dT;  // top
      const r = CX + R + dR;  // right
      const b = CY + R + dB;  // bottom
      const l = CX - R + dL;  // left
      return (
        `M ${CX} ${t} ` +
        `C ${CX+KR} ${t} ${r} ${CY-KR} ${r} ${CY} ` +
        `C ${r} ${CY+KR} ${CX+KR} ${b} ${CX} ${b} ` +
        `C ${CX-KR} ${b} ${l} ${CY+KR} ${l} ${CY} ` +
        `C ${l} ${CY-KR} ${CX-KR} ${t} ${CX} ${t} Z`
      );
    }

    /*
      Composite wave: three overlapping sine components at different
      frequencies — creates an organic, non-repeating feel.
    */
    function wave(t, phase) {
      return (
        5.5 * Math.sin(t * 0.62 + phase)        +  // slow drift
        2.5 * Math.sin(t * 1.85 + phase * 1.37) +  // medium wobble
        1.0 * Math.sin(t * 3.4  + phase * 0.63)    // fast surface ripple
      );
    }

    let live = false;
    let t0   = null;
    let shimmerRad = 0;
    const HALF_PI = Math.PI / 2;

    function loop(ts) {
      if (!t0) t0 = ts;
      const t = (ts - t0) / 1000;  // seconds

      /*
        Four anchors, each 90° out of phase with its neighbours.
        This creates a single rotating wave mode — the highest point
        travels around the edge like water sloshing in a basin.
      */
      const path = buildPath(
        wave(t, 0),
        wave(t, HALF_PI),
        wave(t, Math.PI),
        wave(t, HALF_PI * 3)
      );

      bg.style.setProperty('d',        `path("${path}")`);
      clipShape.style.setProperty('d', `path("${path}")`);

      // Shimmer ellipse rotates continuously — one revolution ≈ 7 s
      shimmerRad += 0.0094;
      shimmer.setAttribute('transform',
        `rotate(${shimmerRad * 180 / Math.PI} ${CX} ${CY})`);

      requestAnimationFrame(loop);
    }

    document.querySelector('svg').addEventListener('click', () => {
      if (live) return;
      live = true;
      hint.classList.add('gone');

      // CSS morph: drop → circle
      bg.classList.add('morphing');

      // Pre-set clip to resting circle (shimmer is hidden so doesn't matter yet)
      clipShape.style.setProperty('d', `path("${buildPath(0, 0, 0, 0)}")`);

      bg.addEventListener('transitionend', () => {
        // Hand off to JS — disable CSS transition first to avoid fighting it
        bg.style.transition = 'none';
        bg.classList.remove('morphing');

        // Seed the inline style at exactly the resting circle
        const seed = buildPath(0, 0, 0, 0);
        bg.style.setProperty('d', `path("${seed}")`);

        shimmerGrp.classList.add('visible');
        t0 = null;
        requestAnimationFrame(loop);
      }, { once: true });
    });
  </script>
</body>
</html>
