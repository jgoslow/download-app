<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Drop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c1628;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    svg {
      cursor: pointer;
      overflow: visible;
      width: 180px;
      height: 200px;
    }

    #bg {
      fill: url(#bgGrad);
      filter: url(#glow);
    }

    #shimmerGroup {
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }
    #shimmerGroup.visible { opacity: 1; }

    .hint {
      color: rgba(147, 210, 240, 0.45);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: opacity 0.7s;
      user-select: none;
    }
    .hint.gone { opacity: 0; }
  </style>
</head>
<body>
  <div class="stage">
    <svg viewBox="0 0 200 220" id="svg">
      <defs>
        <radialGradient id="bgGrad" cx="42%" cy="30%" r="65%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#e0f2fe" />
          <stop offset="20%"  stop-color="#7dd3fc" />
          <stop offset="62%"  stop-color="#0ea5e9" />
          <stop offset="100%" stop-color="#075985" />
        </radialGradient>

        <radialGradient id="shimmerGrad" cx="50%" cy="42%" r="56%">
          <stop offset="0%"   stop-color="#f0f9ff"  stop-opacity="0.82" />
          <stop offset="50%"  stop-color="#bae6fd"  stop-opacity="0.38" />
          <stop offset="100%" stop-color="#38bdf8"  stop-opacity="0" />
        </radialGradient>

        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur" />
          <feFlood flood-color="#38bdf8" flood-opacity="0.45" result="color" />
          <feComposite in="color" in2="blur" operator="in" result="coloredBlur" />
          <feMerge>
            <feMergeNode in="coloredBlur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>

        <clipPath id="shapeClip">
          <path id="clipShape" />
        </clipPath>
      </defs>

      <path id="bg" />

      <g id="shimmerGroup" clip-path="url(#shapeClip)">
        <ellipse id="shimmer" cx="100" cy="140" rx="108" ry="62"
                 fill="url(#shimmerGrad)" />
      </g>
    </svg>

    <span class="hint" id="hint">Click to activate</span>
  </div>

  <script>
    const bg         = document.getElementById('bg');
    const clipShape  = document.getElementById('clipShape');
    const shimmer    = document.getElementById('shimmer');
    const shimmerGrp = document.getElementById('shimmerGroup');
    const hint       = document.getElementById('hint');

    // ── Geometry ─────────────────────────────────────────────────────────────
    const CX = 100, CY = 140, R = 66, KR = 37;

    /*
      Drop shape: near-straight sides taper to a sharp tip (C1 nearly
      vertical from the tip), tangent-joining a circular arc at the bottom.
      Segments 2+3 (the arc) are identical to those of the resting circle so
      only the top half changes during the morph.
    */
    const DROP   = 'M 100 10 C 106 32 166 84 166 140 C 166 177 137 206 100 206 C 63 206 34 177 34 140 C 34 84 94 32 100 10 Z';
    const CIRCLE = 'M 100 74 C 137 74 166 103 166 140 C 166 177 137 206 100 206 C 63 206 34 177 34 140 C 34 103 63 74 100 74 Z';

    // ── Path helpers ─────────────────────────────────────────────────────────
    function nums(d)   { return d.match(/-?\d+\.?\d*/g).map(Number); }
    function tmpl(d)   { return d.replace(/-?\d+\.?\d*/g, '\x00').split('\x00'); }

    const dropNums   = nums(DROP);
    const circleNums = nums(CIRCLE);
    const pathTmpl   = tmpl(DROP);   // structure is same for both

    function buildFromNums(ns) {
      return pathTmpl.reduce((s, t, i) => s + t + (i < ns.length ? ns[i].toFixed(1) : ''), '');
    }

    function setPath(d) {
      bg.setAttribute('d', d);
      clipShape.setAttribute('d', d);
    }

    // ── Easing ───────────────────────────────────────────────────────────────
    // easeOutBack: overshoots slightly then settles (springy release)
    function easeOutBack(t) {
      const c1 = 1.70158, c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    // ── Water animation ───────────────────────────────────────────────────────
    /*
      buildWaterPath: perturb each of the 4 cardinal anchors radially
      using 3 overlapping sine waves per anchor.  Adjacent anchors are 90°
      out of phase → a single wave mode that rotates around the edge.
    */
    function buildWaterPath(t) {
      function w(phase) {
        return (
          5.5 * Math.sin(t * 0.62 + phase)       +   // slow drift
          2.5 * Math.sin(t * 1.85 + phase * 1.37)+   // medium wobble
          1.0 * Math.sin(t * 3.40 + phase * 0.63)    // fast ripple
        );
      }
      const HP = Math.PI / 2;
      const top    = CY - R + w(0);
      const right  = CX + R + w(HP);
      const bottom = CY + R + w(Math.PI);
      const left   = CX - R + w(HP * 3);
      return (
        `M ${CX} ${top.toFixed(1)} ` +
        `C ${(CX+KR).toFixed(1)} ${top.toFixed(1)} ${right.toFixed(1)} ${(CY-KR).toFixed(1)} ${right.toFixed(1)} ${CY} ` +
        `C ${right.toFixed(1)} ${(CY+KR).toFixed(1)} ${(CX+KR).toFixed(1)} ${bottom.toFixed(1)} ${CX} ${bottom.toFixed(1)} ` +
        `C ${(CX-KR).toFixed(1)} ${bottom.toFixed(1)} ${left.toFixed(1)} ${(CY+KR).toFixed(1)} ${left.toFixed(1)} ${CY} ` +
        `C ${left.toFixed(1)} ${(CY-KR).toFixed(1)} ${(CX-KR).toFixed(1)} ${top.toFixed(1)} ${CX} ${top.toFixed(1)} Z`
      );
    }

    // ── State ─────────────────────────────────────────────────────────────────
    let live       = false;
    let waterT0    = null;
    let shimmerRad = 0;

    // ── Morph → water handoff ────────────────────────────────────────────────
    const MORPH_MS = 720;

    function startMorph(startTs) {
      function step(ts) {
        const raw = Math.min((ts - startTs) / MORPH_MS, 1);
        const e   = easeOutBack(raw);
        const ns  = dropNums.map((v, i) => v + (circleNums[i] - v) * e);
        setPath(buildFromNums(ns));

        if (raw < 1) {
          requestAnimationFrame(step);
        } else {
          // Snap to exact resting circle then hand off to water loop
          setPath(CIRCLE);
          shimmerGrp.classList.add('visible');
          requestAnimationFrame(waterLoop);
        }
      }
      requestAnimationFrame(step);
    }

    function waterLoop(ts) {
      if (!waterT0) waterT0 = ts;
      const t = (ts - waterT0) / 1000;

      setPath(buildWaterPath(t));

      // Shimmer rotates one full revolution ≈ every 7 s
      shimmerRad += 0.0094;
      shimmer.setAttribute('transform',
        `rotate(${(shimmerRad * 180 / Math.PI).toFixed(2)} ${CX} ${CY})`);

      requestAnimationFrame(waterLoop);
    }

    // ── Init & click ──────────────────────────────────────────────────────────
    setPath(DROP);

    document.getElementById('svg').addEventListener('click', () => {
      if (live) return;
      live = true;
      hint.classList.add('gone');
      requestAnimationFrame(ts => startMorph(ts));
    });
  </script>
</body>
</html>
